name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross (aarch64-musl)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5
      - name: Build release binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p git-std
      - name: Build release binary (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p git-std
      - name: Collect man pages
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/git-std${{ matrix.ext || '' }} staging/
          find target/ -path '*/build/git-std-*/out/man/*.1' -exec cp {} staging/ \;
      - name: Create tarball
        shell: bash
        run: |
          tar czf git-std-${{ matrix.target }}.tar.gz -C staging .
      - name: Generate SHA256 checksum
        shell: bash
        run: sha256sum git-std-${{ matrix.target }}.tar.gz > git-std-${{ matrix.target }}.tar.gz.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: git-std-${{ matrix.target }}
          path: |
            git-std-${{ matrix.target }}.tar.gz
            git-std-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            git-std-*.tar.gz
            git-std-*.tar.gz.sha256

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish() {
            local crate="$1"
            # Skip if already published (uses crates.io API — more reliable than cargo search).
            local pkg_version
            pkg_version=$(cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")
            local published
            published=$(curl -sf "https://crates.io/api/v1/crates/$crate" \
              | jq -r '.crate.newest_version // ""' || true)
            if [ "$pkg_version" = "$published" ]; then
              echo "==> $crate $pkg_version already published, skipping"
              return 0
            fi
            echo "==> Publishing $crate $pkg_version"
            cargo publish -p "$crate"
            # Wait for the crate index to update before publishing dependents.
            sleep 30
          }

          publish standard-commit
          publish standard-changelog
          publish standard-version
          publish standard-githooks
          publish git-std

          echo "==> All crates published."
