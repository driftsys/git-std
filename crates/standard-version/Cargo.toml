[package]
name = "standard-version"
version = "0.2.0"
edition = "2024"
description = "Semantic and calendar version bump calculation"
license = "MIT"
readme = "README.md"
repository = "https://github.com/driftsys/git-std"
keywords = ["semver", "calver", "version", "bump", "git"]
categories = ["development-tools"]

[dependencies]
regex = "1"
semver = "1"
serde_json = "1"
standard-commit = { version = "0.2.0", path = "../standard-commit" }

[dev-dependencies]
tempfile = "3"
